services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: xapi_lrs
      POSTGRES_PASSWORD: xapi_lrs
      POSTGRES_DB: xapi_lrs
    ports:
      - "${PGPORT:-5434}:5432"
    volumes:
      - ./db/migrations/committed/000001-lrsql-schema.sql:/docker-entrypoint-initdb.d/000001-lrsql-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xapi_lrs"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql

  lrs:
    profiles: [app]
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: xapi_lrs
      PGUSER: xapi_lrs
      PGPASSWORD: xapi_lrs
      LRS_PORT: 8081
      LRS_ADMIN_PORT: 8091
      LRS_ADMIN_USER: admin
      LRS_ADMIN_PASSWORD: admin
      ADMIN_SESSION_SECRET: dev-session-secret-change-me
      LOG_LEVEL: info
      NODE_ENV: production
    ports:
      - "${LRS_PORT:-8081}:8081"
      - "${LRS_ADMIN_PORT:-8091}:8091"
