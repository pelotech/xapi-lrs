services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: lrs
      POSTGRES_PASSWORD: insecure
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lrs"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
