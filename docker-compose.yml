services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: xapi_lrs
      POSTGRES_PASSWORD: xapi_lrs
      POSTGRES_DB: xapi_lrs
    ports:
      - '${PGPORT:-5434}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U xapi_lrs']
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql

  xapi-lrs:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: xapi_lrs
      PGUSER: xapi_lrs
      PGPASSWORD: xapi_lrs
      LRS_PORT: 8081
      LRS_ADMIN_PORT: 8091
      LRS_ADMIN_USER: admin
      LRS_ADMIN_PASSWORD: admin
      ADMIN_SESSION_SECRET: dev-session-secret-change-me
      LOG_LEVEL: info
      CORS_ENABLED: 'false'
      CORS_ORIGIN: http://xapi-lrs
      NODE_ENV: production
      # The postgres service no longer pre-loads the schema via
      # docker-entrypoint-initdb.d (removed so `node dist/migrate.js` / the
      # migrate-gate CI job are what create the schema, and so lrsql-takeover
      # provisioning order isn't inverted). AUTO_MIGRATE runs graphile-migrate
      # at startup so this quick-start still boots against an empty database.
      AUTO_MIGRATE: 'true'
    ports:
      - '${LRS_PORT:-8081}:8081'
      - '${LRS_ADMIN_PORT:-8091}:8091'
