name: Release Please
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      release_version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-tag:
    if: ${{ fromJSON(needs.release-please.outputs.releases_created) }}
    runs-on: ubuntu-latest
    needs: [release-please]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
      - name: Build and push Docker image tag
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64, linux/arm64
          file: Dockerfile
          push: true
          build-args: |
            BUILD_VERSION="${{ needs.release-please.outputs.tag_name }}"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      # - name: Build dependencies Helm - xapi-lrs
      #   uses: WyriHaximus/github-action-helm3@v4
      #   with:
      #     exec: helm dependency build charts/xapi-lrs
      # - name: Chart | Push - xapi-lrs
      #   uses: appany/helm-oci-chart-releaser@v0.5.0
      #   with:
      #     name: xapi-lrs
      #     repository: pelotech/charts
      #     tag: ${{ needs.release-please.outputs.release_version }}
      #     registry: ghcr.io
      #     registry_username: ${{ github.actor }}
      #     registry_password: ${{ secrets.github_token }}

  publish-dev:
    if: ${{ ! fromJSON(needs.release-please.outputs.releases_created) }}
    runs-on: ubuntu-latest
    needs: [release-please]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: sha short
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build and push Docker image sha
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64, linux/arm64
          file: Dockerfile
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.sha.outputs.sha_short }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
