name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm fmt:check
      - run: pnpm lint:arch

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  integration-tests:
    name: Integration Tests (${{ matrix.driver }}${{ matrix.schema-source == 'lrsql' && ', lrsql takeover' || '' }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        driver: [pg, pglite]
        schema-source: [migration]
        include:
          - driver: pglite
            schema-source: lrsql
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Start Postgres
        if: matrix.driver == 'pg'
        # postgres ONLY — a bare `up -d --wait` also starts the xapi-lrs
        # container (now booting via AUTO_MIGRATE), making these jobs
        # incidentally depend on its startup; the tests provision the schema
        # themselves via global-setup.
        run: docker compose up -d --wait postgres
      - name: Load test env
        if: matrix.driver == 'pg'
        run: grep -v '^\s*#' .env.test | grep -v '^\s*$' >> "$GITHUB_ENV"
      - name: Set PGlite data dir
        if: matrix.driver == 'pglite'
        run: echo "PGLITE_DATA_DIR=${{ runner.temp }}/pglite-data" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration
        env:
          DATABASE_DRIVER: ${{ matrix.driver }}
          SCHEMA_SOURCE: ${{ matrix.schema-source }}
      - name: Postgres logs
        if: failure() && matrix.driver == 'pg'
        run: docker compose logs postgres
      - name: Cleanup
        if: always() && matrix.driver == 'pg'
        run: docker compose down

  conformance-tests:
    name: Conformance Tests (${{ matrix.driver }}, xAPI ${{ matrix.xapi-version }}${{ matrix.schema-source == 'lrsql' && ', lrsql takeover' || '' }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        driver: [pg, pglite]
        xapi-version: ['1.0.3', '2.0.0']
        schema-source: [migration, lrsql]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Start Postgres
        if: matrix.driver == 'pg'
        # postgres ONLY — a bare `up -d --wait` also starts the xapi-lrs
        # container (now booting via AUTO_MIGRATE), making these jobs
        # incidentally depend on its startup; the tests provision the schema
        # themselves via global-setup.
        run: docker compose up -d --wait postgres
      - name: Load test env
        if: matrix.driver == 'pg'
        run: grep -v '^\s*#' .env.test | grep -v '^\s*$' >> "$GITHUB_ENV"
      - name: Set PGlite data dir
        if: matrix.driver == 'pglite'
        run: echo "PGLITE_DATA_DIR=${{ runner.temp }}/pglite-data" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:conformance
        env:
          DATABASE_DRIVER: ${{ matrix.driver }}
          CONFORMANCE_XAPI_VERSION: ${{ matrix.xapi-version }}
          SCHEMA_SOURCE: ${{ matrix.schema-source }}
      - name: Postgres logs
        if: failure() && matrix.driver == 'pg'
        run: docker compose logs postgres
      - name: Cleanup
        if: always() && matrix.driver == 'pg'
        run: docker compose down

  migrate-gate:
    name: Migrate Gate (fresh pg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Start Postgres
        # postgres ONLY — a bare `up -d --wait` would also start the xapi-lrs
        # container, stealing ports 8081/8091 from the compiled-artifact
        # server this gate exists to test.
        run: docker compose up -d --wait postgres
      - name: Load test env
        run: grep -v '^\s*#' .env.test | grep -v '^\s*$' >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run migrations against empty database (compiled artifact)
        run: node dist/migrate.js
      - name: Boot server and smoke an authenticated request
        # /xapi/about is unauthenticated (src/app.ts skips auth for it); the
        # spec requires an AUTHENTICATED smoke, so bootstrap a known credential
        # and hit /xapi/statements with it.
        run: |
          XAPI_LRS_ADMIN_USER=admin XAPI_LRS_ADMIN_PASSWORD=admin-ci-password \
          XAPI_LRS_API_KEY_DEFAULT=ci-key XAPI_LRS_API_SECRET_DEFAULT=ci-secret \
          node dist/server.js &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          ok=""
          for i in $(seq 1 30); do
            curl -sf http://localhost:8091/healthz && ok=1 && break || sleep 1
          done
          [ -n "$ok" ] || { echo "server never became healthy"; exit 1; }
          curl -sf -u ci-key:ci-secret -H 'X-Experience-API-Version: 1.0.3' \
            'http://localhost:8081/xapi/statements?limit=1'
          # server is torn down by the trap on EXIT
      - name: Cleanup
        if: always()
        run: docker compose down

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests, integration-tests, conformance-tests, migrate-gate]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          tags: xapi-lrs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
