name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm fmt:check
      - run: pnpm lint:arch

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  integration-tests:
    name: Integration Tests (${{ matrix.driver }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        driver: [pg, pglite]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Start Postgres
        if: matrix.driver == 'pg'
        run: docker compose up -d --wait
      - name: Load test env
        if: matrix.driver == 'pg'
        run: grep -v '^\s*#' .env.test | grep -v '^\s*$' >> "$GITHUB_ENV"
      - name: Set PGlite data dir
        if: matrix.driver == 'pglite'
        run: echo "PGLITE_DATA_DIR=${{ runner.temp }}/pglite-data" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration
        env:
          DATABASE_DRIVER: ${{ matrix.driver }}
      - name: Postgres logs
        if: failure() && matrix.driver == 'pg'
        run: docker compose logs postgres
      - name: Cleanup
        if: always() && matrix.driver == 'pg'
        run: docker compose down

  conformance-tests:
    name: Conformance Tests (${{ matrix.driver }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        driver: [pg, pglite]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Start Postgres
        if: matrix.driver == 'pg'
        run: docker compose up -d --wait
      - name: Load test env
        if: matrix.driver == 'pg'
        run: grep -v '^\s*#' .env.test | grep -v '^\s*$' >> "$GITHUB_ENV"
      - name: Set PGlite data dir
        if: matrix.driver == 'pglite'
        run: echo "PGLITE_DATA_DIR=${{ runner.temp }}/pglite-data" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:conformance
        env:
          DATABASE_DRIVER: ${{ matrix.driver }}
      - name: Postgres logs
        if: failure() && matrix.driver == 'pg'
        run: docker compose logs postgres
      - name: Cleanup
        if: always() && matrix.driver == 'pg'
        run: docker compose down

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests, integration-tests, conformance-tests]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: false
          tags: xapi-lrs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
