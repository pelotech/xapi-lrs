repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=25"]
        exclude: "pnpm-lock\\.yaml$|^docs/reference/|^src/build/swagger\\.json$|^src/build/routes\\.ts$"
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: "^docs/reference/"

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: pnpm lint
        language: system
        types_or: [ts, javascript]
        pass_filenames: false

      - id: typecheck
        name: typecheck
        entry: pnpm typecheck
        language: system
        types: [ts]
        pass_filenames: false

      - id: test
        name: test
        entry: pnpm test
        language: system
        types: [ts]
        pass_filenames: false
